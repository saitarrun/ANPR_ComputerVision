# Alembic Configuration
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# default empty
#prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the "slug" field
# set to 40 to truncate long names
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Loggers to configure in logging config.
# Keys are logger names, values are logger levels.
# loggers =

# Logging configuration file, relative to the migration folder
# logfile = alembic.log

# log level to logging.getLogger("alembic.runtime.migration") - when using FileHandler
# see Python's logging.handlers.RotatingFileHandler config
# and logging_file_level config parameter below for more details
# metaprogramming of object attributes. each string token is
# replaced with an appropriate request to the
# RuntimeEnvironment() object at runtime. downgrade() function will be
# called with [down --] argument of the migration name. example: for
# down --5ae2b90a4c95, run migration downgrade(-1)
# for running any optional sql
# sqlalchemy.url driver://user:password@localhost/dbname

[loggers]
keys = sqlalchemy.engine,sqlalchemy.pool,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_sqlalchemy.pool]
level = WARN
handlers =
qualname = sqlalchemy.pool

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
