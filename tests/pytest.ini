[pytest]
minversion = 8.0
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    unit: unit tests (fast, isolated)
    integration: integration tests (requires docker/testcontainers)
    e2e: end-to-end tests (against running API)
    slow: tests that take > 1s
    security: security-related tests
    rbac: role-based access control tests
    websocket: WebSocket tests
    celery: Celery task tests
    async: async tests

# Strict marker enforcement
strict_markers = true

# Coverage options
addopts =
    -ra
    --strict-config
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (helps catch hangs)
timeout = 30

# Asyncio
asyncio_mode = auto
