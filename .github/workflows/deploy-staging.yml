name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Don't cancel ongoing deployments

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  DEPLOY_TIMEOUT: 600  # 10 minutes

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging  # Require approval if configured in GitHub
    permissions:
      contents: read
      packages: read
    outputs:
      deployment-id: ${{ steps.deploy.outputs.deployment-id }}
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      # Determine image tag from git commit
      - name: Determine image tag
        id: image-tag
        run: |
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          BRANCH=$(echo "${{ github.ref }}" | sed 's/refs\/heads\///')
          IMAGE_TAG="${BRANCH}-${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Deploying image tag: ${IMAGE_TAG}"

      # Login to GHCR
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Create deployment record in GitHub
      - name: Create deployment
        id: deploy
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              auto_merge: false,
              required_contexts: [],
              description: 'Deploy to staging from ${{ github.ref }}'
            });
            core.setOutput('deployment-id', deployment.data.id);
            return deployment.data.id;

      # Deploy via docker-compose or kubectl (adjust per your setup)
      - name: Deploy to staging cluster
        id: deploy-cluster
        timeout-minutes: 10
        run: |
          set -e
          echo "Deploying to staging..."

          # Example: Using docker-compose on staging server
          # Replace with your actual deployment method (kubectl, ECS, etc.)

          DEPLOY_HOST="${{ secrets.STAGING_DEPLOY_HOST }}"
          DEPLOY_USER="${{ secrets.STAGING_DEPLOY_USER }}"
          DEPLOY_KEY="${{ secrets.STAGING_DEPLOY_KEY }}"
          DEPLOY_PATH="/opt/anpr/staging"

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Pull latest code and deploy
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" bash << 'EOF'
            set -e
            cd $DEPLOY_PATH
            git pull origin main

            # Update image in docker-compose
            export IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"
            docker-compose -f docker-compose.staging.yml pull api worker
            docker-compose -f docker-compose.staging.yml up -d api worker

            # Wait for API to be healthy
            for i in {1..30}; do
              if docker-compose -f docker-compose.staging.yml exec -T api curl -f http://localhost:8000/healthz; then
                echo "API is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "API failed to start"
            exit 1
          EOF

          echo "Deployment to staging completed"
          echo "staging-url=https://staging-api.anpr.internal" >> $GITHUB_OUTPUT

      # Run smoke tests against staging
      - name: Run smoke tests
        timeout-minutes: 5
        run: |
          set -e
          STAGING_URL="https://staging-api.anpr.internal"

          echo "Checking API health..."
          curl -f "$STAGING_URL/healthz" || exit 1

          echo "Checking POST /health endpoint..."
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /dev/null -X POST "$STAGING_URL/health")
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Health check passed"
          else
            echo "Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Checking database connectivity..."
          curl -f "$STAGING_URL/api/v1/status" || exit 1

          echo "Smoke tests passed"

      # Mark deployment as successful
      - name: Mark deployment successful
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deploy.outputs.deployment-id }},
              state: 'success',
              environment_url: '${{ steps.deploy-cluster.outputs.staging-url }}',
              description: 'Deployment succeeded'
            });

      # Mark deployment as failed
      - name: Mark deployment failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deploy.outputs.deployment-id }},
              state: 'failure',
              description: 'Deployment failed'
            });

      # Notify on failure
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          payload: |
            {
              "text": "Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Failed*\n*Repo:* ${{ github.repository }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        continue-on-error: true
