name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check . --exit-zero
        continue-on-error: false

      - name: Ruff format check
        run: uv run ruff format --check .
        continue-on-error: false

      - name: Mypy type checking
        run: uv run mypy anpr_core api ingest workers db
        continue-on-error: false

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anpr
          POSTGRES_PASSWORD: ${{ secrets.CI_DATABASE_PASSWORD }}
          POSTGRES_DB: anpr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U anpr -d anpr"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://anpr:${{ secrets.CI_DATABASE_PASSWORD }}@localhost:5432/anpr
      REDIS_URL: redis://localhost:6379/0
      FERNET_KEY: ${{ secrets.CI_FERNET_KEY }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11
      - run: uv sync --extra dev

      # Run unit tests
      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=anpr_core --cov=api --cov=workers --cov-report=term-missing

      # Run integration tests against real DB
      - name: Integration tests
        run: uv run pytest tests/integration -v --tb=short -m "not gpu"

      # Check coverage threshold
      - name: Check coverage
        run: |
          uv run pytest tests/ --cov=anpr_core --cov=api --cov=workers --cov-report=term --cov-fail-under=75

      # Upload coverage to codecov (optional, enable if you use codecov.io)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.11
      - run: uv sync --extra dev

      # Dependency vulnerability scanning
      - name: pip-audit (dependencies)
        run: uv run pip-audit --desc || true

      # Filesystem scanning
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  build-image:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.image.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      # Set up Docker Buildx for multi-platform builds
      - uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image metadata (tags, labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push Docker image
      - name: Build and push image
        id: image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan Docker image for vulnerabilities
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # Smoke test: verify API boots and responds
  smoke-test:
    if: github.event_name == 'pull_request'
    needs: build-image
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anpr
          POSTGRES_PASSWORD: ${{ secrets.CI_DATABASE_PASSWORD }}
          POSTGRES_DB: anpr
        options: >-
          --health-cmd "pg_isready -U anpr"
          --health-interval 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Start API container
        run: |
          docker run -d \
            --name api \
            --network host \
            -e DATABASE_URL=postgresql+psycopg://anpr:${{ secrets.CI_DATABASE_PASSWORD }}@localhost:5432/anpr \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e FERNET_KEY=${{ secrets.CI_FERNET_KEY }} \
            -e JWT_SECRET=${{ secrets.CI_JWT_SECRET }} \
            -e APP_ENV=test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for API to be healthy
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/healthz; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt $i/30: API not ready, retrying in 2s..."
            sleep 2
          done
          echo "API failed to start"
          docker logs api
          exit 1

      - name: Verify POST /health returns 200
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8000/health)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Health check passed"
          else
            echo "Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker stop api || true

  # Job to gate branch protection
  status-check:
    if: always()
    needs: [lint, test, security, build-image, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check all checks passed
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.test.result }}" == "failure" || "${{ needs.security.result }}" == "failure" || "${{ needs.build-image.result }}" == "failure" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed"
