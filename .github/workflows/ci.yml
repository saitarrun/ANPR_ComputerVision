name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy anpr_core api ingest workers db

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anpr
          POSTGRES_PASSWORD: anpr_dev_pw
          POSTGRES_DB: anpr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U anpr -d anpr"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://anpr:anpr_dev_pw@localhost:5432/anpr
      REDIS_URL: redis://localhost:6379/0
      FERNET_KEY: zh4eRk9wYn7K6Jx2Vh1FmTqLpYg5RfNs8Ub3CdEoAuI=
      JWT_SECRET: ci-jwt-secret-not-for-production-use-only
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - name: Unit tests
        run: uv run pytest tests/unit -q
      - name: Integration tests
        run: uv run pytest tests/integration -q -m "not gpu"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - name: pip-audit
        run: uv run pip-audit --strict || true
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  bench-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Skip until golden set lands (M10)
        run: echo "Bench gate enabled at M10."
