augmentation:
  degrees: 20
  fliplr: 0.5
  flipud: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  mixup: 0.1
  mosaic: 1.0
  scale: 0.5
  translate: 0.1
dataset:
  root: ~/.cache/anpr-datasets
  test_ratio: 0.2
  train_ratio: 0.6
  val_ratio: 0.2
detector:
  batch_size: 16
  device: cpu
  epochs: 10
  export_formats:
  - pt
  - onnx
  - tflite
  imgsz: 640
  lr0: 0.01
  lrf: 0.01
  model: yolov8s.pt
  momentum: 0.937
  optimizer: SGD
  patience: 5
  weight_decay: 0.0005
logging:
  experiment_name: anpr-detector
  project_name: anpr
  run_name: yolov8s-finetune-v1
  save_period: 5
  track_metrics: true
  track_params: true
validation:
  conf: 0.25
  iou: 0.6
  metrics:
  - mAP50
  - mAP75
  - precision
  - recall
