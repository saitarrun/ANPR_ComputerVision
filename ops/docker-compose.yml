# OrbStack-compatible compose. Run via OrbStack engine:
#   docker context use orbstack
#   docker compose -f ops/docker-compose.yml up -d
#
# Day 1 M6 (2026-05-27): Added api (FastAPI) and worker (Celery) services.
# All 7 services (postgres, redis, minio, prometheus, grafana, api, worker) reach healthy state.
name: anpr

services:
  postgres:
    image: postgres:16-alpine
    container_name: anpr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-anpr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anpr} -d ${POSTGRES_DB:-anpr}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: anpr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: anpr-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-anpr_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-anpr_dev_pw}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: anpr-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-anpr_admin} ${MINIO_ROOT_PASSWORD:-anpr_dev_pw};
      mc mb --ignore-existing local/anpr-crops;
      mc mb --ignore-existing local/anpr-frames;
      mc mb --ignore-existing local/anpr-audit;
      exit 0;
      "

  prometheus:
    image: prom/prometheus:latest
    container_name: anpr-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: anpr-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: anpr-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # App
      ANPR_ENV: ${ANPR_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: ${API_WORKERS:-2}

      # Auth + Security
      SECRET_KEY: ${SECRET_KEY:-change-me-dev-only-secret-key-32plus-bytes}
      FERNET_KEY: ${FERNET_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-only-jwt-secret-32plus-bytes}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}

      # Database
      DATABASE_URL: postgresql+psycopg://anpr:${POSTGRES_PASSWORD:-anpr_dev_pw}@postgres:5432/${POSTGRES_DB:-anpr}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-anpr}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # MinIO / S3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-anpr_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-anpr_dev_pw}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET_CROPS: ${S3_BUCKET_CROPS:-anpr-crops}
      S3_BUCKET_FRAMES: ${S3_BUCKET_FRAMES:-anpr-frames}
      S3_BUCKET_AUDIT: ${S3_BUCKET_AUDIT:-anpr-audit}

      # Observability
      PROMETHEUS_MULTIPROC_DIR: /tmp/prom-multi
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

      # Models
      DETECTOR_WEIGHTS: ${DETECTOR_WEIGHTS:-models/plate_yolov8s.pt}
      OCR_BACKEND: ${OCR_BACKEND:-paddle}
      PADDLE_OCR_LANG: ${PADDLE_OCR_LANG:-en}

      # Pipeline
      TARGET_FPS: ${TARGET_FPS:-15}
      CONFIDENCE_PLATE: ${CONFIDENCE_PLATE:-0.75}
      CONFIDENCE_CHAR: ${CONFIDENCE_CHAR:-0.60}
      TRACK_VOTE_WINDOW: ${TRACK_VOTE_WINDOW:-8}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ..:/app

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    container_name: anpr-worker
    restart: unless-stopped
    environment:
      # App
      ANPR_ENV: ${ANPR_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Database
      DATABASE_URL: postgresql+psycopg://anpr:${POSTGRES_PASSWORD:-anpr_dev_pw}@postgres:5432/${POSTGRES_DB:-anpr}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-anpr}

      # Redis + Celery
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

      # MinIO / S3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-anpr_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-anpr_dev_pw}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET_CROPS: ${S3_BUCKET_CROPS:-anpr-crops}
      S3_BUCKET_FRAMES: ${S3_BUCKET_FRAMES:-anpr-frames}
      S3_BUCKET_AUDIT: ${S3_BUCKET_AUDIT:-anpr-audit}

      # Security
      FERNET_KEY: ${FERNET_KEY:-}

      # Models
      DETECTOR_WEIGHTS: ${DETECTOR_WEIGHTS:-models/plate_yolov8s.pt}
      OCR_BACKEND: ${OCR_BACKEND:-paddle}
      PADDLE_OCR_LANG: ${PADDLE_OCR_LANG:-en}

      # Pipeline
      TARGET_FPS: ${TARGET_FPS:-15}
      CONFIDENCE_PLATE: ${CONFIDENCE_PLATE:-0.75}
      CONFIDENCE_CHAR: ${CONFIDENCE_CHAR:-0.60}
      TRACK_VOTE_WINDOW: ${TRACK_VOTE_WINDOW:-8}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ..:/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
